<html lang="ko">
<head>

  <meta name="twitter:image" content="https://gallerywindow.com/assets/og-gallery.jpg">

  <title>Gallery Window – Exhibition</title>

  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-M2QQ5KME88"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());

    gtag('config', 'G-M2QQ5KME88');

  <!-- Favicon -->
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">

  <!-- Apple / iPhone -->
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <meta name="theme-color" content="#111111">

  <!-- Open Graph -->
  <meta property="og:title" content="Gallery Window">
  <meta property="og:description" content="Online Exhibition Space">
  <meta property="og:image"
        content="https://gallerywindow.com/assets/og-gallery.jpg">
  <meta property="og:type" content="website">

  <!-- SEO -->
  <meta name="description"
        content="Gallery Window is an online photography exhibition platform presenting contemporary conceptual photography.">

  <!-- Exhibition 전용 CSS -->
  <link rel="stylesheet" href="/assets/css/style.css">

  <!-- ===== 페이지 전용 영역 (절대 서로 복사 금지) ===== -->
  <link rel="stylesheet" href="/assets/css/exhibition.css">

  <!-- Structured Data -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "ExhibitionEvent",
  "name": "Avatar II",
  "startDate": "2026-02-15",
  "location": {
    "@type": "VirtualLocation",
    "url": "https://gallerywindow.com"
  },
  "image": "https://chemiology.github.io/gallery-window/assets/posters/avatar_ii.jpg",
  "organizer": {
    "@type": "Person",
    "name": "Kyoungsoo Kim"
  }
}
</script>
</head>

<body class="exhibition">

<div class="viewer">

  <img id="exhibition-image" src="" alt="">

  <div class="image-shield"></div>

  <div id="exhibition-caption"></div>

  <div id="artwork-counter"></div>

  <!-- ⭐ 슬라이드 진행 bar -->
  <div id="slide-progress"></div>

  <div id="slideshow-notice">
    작품은 10초마다 자동으로 전환됩니다.<br>
    화면을 터치하면 음악이 재생됩니다.<br>
    <span class="notice-en">
    Artwork advances every 10 seconds. Tap to enable sound.
    </span>
</div>

</div>

  <!-- 컨트롤 패널 -->
  <div class="control-panel">
    <div class="control-toggle">⚙</div>
    <div class="control-box" style="display:none;">
      <label>
        Viewing Mode<br>
        <input type="radio" name="mode" value="auto" checked> Auto
        <input type="radio" name="mode" value="manual"> Manual
      </label>

      <label>
        Slide Speed
        <input type="range" id="speed" min="3" max="20" value="10">
      </label>

      <label>
        Volume
        <input type="range" id="volume" min="0" max="1" step="0.01" value="0.5">
      </label>

      <button id="mute">Mute</button>
    </div>
  </div>

<p class="audio-hint">
  설정에서 음향을 켜세요.<br>
  화면을 터치하면 전시의 숨이 시작됩니다.
</p>

  <!-- 캡션 -->
  <div class="caption" id="caption"></div>

<a id="backHome" class="back-home-exhibition">
  ← Hall
</a>

  <!-- JS -->
  <script src="/assets/js/exhibition.js"></script>

  <div class="page-fade" id="pageFade"></div>

</body>

<div class="site-background"></div>

</html>
