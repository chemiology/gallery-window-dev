<!DOCTYPE html>
<html lang="ko">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Video Exhibition | Gallery Window</title>

<style>

body{
margin:0;
background:#000;
color:#ddd;
font-family:system-ui, sans-serif;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
min-height:100vh;
}

.video-title{
margin-top:30px;
font-size:18px;
letter-spacing:1px;
}

.video-container{
width:90%;
max-width:1100px;
aspect-ratio:16/9;
margin-top:20px;
box-shadow:0 0 60px rgba(0,0,0,0.8);
}

iframe{
width:100%;
height:100%;
border:none;
}

.info{
margin-top:20px;
font-size:14px;
color:#aaa;
text-align:center;
}

.controls{
margin-top:25px;
opacity:0;
transition:opacity .4s ease;
}

.controls.show{
opacity:1;
}

.back-link{
margin-top:25px;
font-size:13px;
opacity:.7;
}

.back-link a{
color:#ccc;
text-decoration:none;
}

.back-link a:hover{
color:#fff;
}

<div class="back-link">
<a id="backToHall">← 전시관으로 돌아가기</a>
</div>

button{
background:rgba(255,255,255,0.08);
color:#ddd;
border:none;
padding:10px 22px;
margin:6px;
font-size:13px;
cursor:pointer;
transition:all .25s ease;
}

button:hover{
background:rgba(255,255,255,0.18);
color:#fff;
}

@media (max-width:700px){

.video-container{
width:100%;
}

button{
padding:10px 18px;
font-size:13px;
}

.video-caption{
margin-top:18px;
opacity:0.8;
font-size:13px;
color:#bbb;
text-align:center;
letter-spacing:0.3px;
}

.nav-back{
margin-top:25px;
font-size:13px;
opacity:.7;
}

.nav-back a{
color:#ccc;
text-decoration:none;
cursor:pointer;
}

.nav-back a:hover{
color:#fff;
}

.immersive .video-title,
.immersive .video-caption,
.immersive .controls,
.immersive .nav-back{
opacity:0;
transition:opacity .6s ease;
}

body:not(.immersive) .video-title,
body:not(.immersive) .video-caption,
body:not(.immersive) .controls,
body:not(.immersive) .nav-back{
opacity:1;
}

.fullscreen-tip{
margin-top:6px;
font-size:11px;
opacity:.45;
letter-spacing:0.5px;
text-align:center;
}

body::after{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
background:
radial-gradient(
circle at center,
rgba(0,0,0,0) 60%,
rgba(0,0,0,0.35) 100%
);
z-index:-1;
}

.video-loading{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:14px;
opacity:0.7;
letter-spacing:1px;
pointer-events:none;
}

.video-container{
position:relative;
}

</style>

</head>

<body>

<div class="video-title" id="videoTitle"></div>

<div class="video-container">

<div class="video-loading">Loading...</div>

<iframe id="video-frame"
loading="lazy"
allow="autoplay; encrypted-media"
allowfullscreen></iframe>

</div>

<div class="video-caption" id="video-caption"></div>

<div class="fullscreen-tip">
F : Fullscreen · ESC : Exit
</div>

<div class="controls">

<button onclick="prevVideo()">Prev</button>

<button onclick="nextVideo()">Next</button>

</div>

<div class="nav-back">
  <a id="backToHall">← Hall</a>
</div>

<script>

/* ======================================
   URL 파라미터
====================================== */

const params = new URLSearchParams(location.search);
const exhibitionId = params.get("id");

/* ======================================
   상태 변수
====================================== */

let videos = [];
let currentIndex = 0;

/* ======================================
   전시 제목 로드
====================================== */

fetch("/assets/config/gallery.json")
.then(r => r.json())
.then(data => {

const exhibitions =
data.currentExhibitions || data.exhibitions || [];

const ex = exhibitions.find(e => e.id === exhibitionId);

if(ex){
document.getElementById("videoTitle").innerText = ex.title;
}

});

/* ======================================
   영상 목록 로드
====================================== */

fetch("/assets/config/videos.json")
.then(r => r.json())
.then(data => {

videos = data[exhibitionId] || [];

if(videos.length === 0){
document.getElementById("video-info").innerText =
"영상 작품이 등록되지 않았습니다.";
return;
}

loadVideo();

});

/* ======================================
   영상 로드
====================================== */

function loadVideo(){

const video = videos[currentIndex];

const frame = document.getElementById("video-frame");
const loading = document.querySelector(".video-loading");

loading.style.display = "block";

frame.src = "";

frame.src =
"https://www.youtube.com/embed/" +
video.youtube +
"?autoplay=1&mute=1&enablejsapi=1&rel=0&playsinline=1&t=" + Date.now();

frame.onload = () => {
loading.style.display = "none";
};

const captionElement =
document.getElementById("video-caption");

if(captionElement){
captionElement.innerText = video.caption || "";
}

}

/* ======================================
   다음 영상
====================================== */

function nextVideo(){

currentIndex++;

if(currentIndex >= videos.length){
currentIndex = 0;
}

loadVideo();

}

/* ======================================
   이전 영상
====================================== */

function prevVideo(){

currentIndex--;

if(currentIndex < 0){
currentIndex = videos.length - 1;
}

loadVideo();

}

/* ======================================
   영상 종료 → 자동 다음 작품
====================================== */

window.addEventListener("message", function(event){

if(event.data && event.data.event === "onStateChange"){

if(event.data.info === 0){
nextVideo();
}

}

});

/* ======================================
   키보드 이동
====================================== */

document.addEventListener("keydown", function(e){

if(e.key === "ArrowRight") nextVideo();
if(e.key === "ArrowLeft") prevVideo();

});

/* ======================================
   컨트롤 자동 숨김
====================================== */

const controls = document.querySelector(".controls");

let hideTimer;

function showControls(){

controls.classList.add("show");

clearTimeout(hideTimer);

hideTimer = setTimeout(()=>{
controls.classList.remove("show");
},2000);

}

document.addEventListener("mousemove", showControls);
document.addEventListener("touchstart", showControls);

showControls();

/* ======================================
   전체 화면
====================================== */

function toggleFullscreen(){

const elem = document.querySelector(".video-container");

if (!document.fullscreenElement) {

elem.requestFullscreen().catch(err => console.log(err));

} else {

document.exitFullscreen();

}

}

document
.querySelector(".video-container")
.addEventListener("dblclick", toggleFullscreen);

document.addEventListener("keydown", function(e){

if(e.key === "f" || e.key === "F"){
toggleFullscreen();
}

});

/* ======================================
   Hall 돌아가기
====================================== */

const backBtn = document.getElementById("backToHall");

if(backBtn){

backBtn.onclick = () => {

const hall = params.get("hall") || "hall50";

window.location.href = `/hall.html?hall=${hall}`;

};

}

let immersiveTimer;

function activateImmersive(){

clearTimeout(immersiveTimer);

document.body.classList.remove("immersive");

immersiveTimer = setTimeout(()=>{
document.body.classList.add("immersive");
},3000);

}

document.addEventListener("mousemove", activateImmersive);
document.addEventListener("touchstart", activateImmersive);

activateImmersive();

let pressTimer;

const videoArea = document.querySelector(".video-container");

videoArea.addEventListener("touchstart", () => {
pressTimer = setTimeout(toggleFullscreen, 600);
});

videoArea.addEventListener("touchend", () => {
clearTimeout(pressTimer);
});

</script>

</body>
</html>
