<!DOCTYPE html>
<html>
<head>
  
 <!-- ===== 공통 영역 (모든 페이지 동일) ===== -->
  <meta charset="UTF-8">
  <meta name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover">

  <title>Gallery Hall</title>

  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-M2QQ5KME88"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());

    gtag('config', 'G-M2QQ5KME88');
  </script>

  <!-- Favicon -->
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">

  <!-- Apple / iPhone -->
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <meta name="theme-color" content="#111111">

  <!-- Open Graph -->
  <meta property="og:title" content="Gallery Window">
  <meta property="og:description" content="Online Exhibition Space">
  <meta property="og:image"
        content="https://chemiology.github.io/gallery-window/assets/og-gallery.jpg">
  <meta property="og:type" content="website">

  <!-- SEO -->
  <meta name="description"
        content="Gallery Window — Contemporary online photography exhibition space by Kyoungsoo Kim.">

  <link rel="stylesheet" href="/assets/css/style.css">
<!-- ===== 페이지 전용 영역 (절대 서로 복사 금지) ===== -->

</head>

<body class="hall">

<div class="site-background hall"></div>

<h1 id="hallTitle"></h1>

<div id="exhibitionList" class="hall-grid"></div>


<div class="hall-entry">

  <div class="hall-left">
    <img id="hallPoster" class="hall-poster">
    <div id="artistProfile" class="artist-profile"></div>
  </div>

  <div class="artist-note-area">
    <div id="artistNote" class="artist-note"></div>

    <div class="entry-buttons">
      <a href="/index.html" class="back-main">← 대표화면</a>
      <a id="enterExhibition" class="enter-exhibition">작품 보기 →</a>
    </div>

  </div>

</div>

<!-- 방명록을 hall-entry 밖으로 이동 -->

<div class="guestbook-section">

<h3 class="guestbook-title">방명록</h3>

<form
action="https://script.google.com/macros/s/AKfycbxosBRSAcNGTRHQXIm6EIVQKEnFhFlK4jMGpIDFnccUfwXcLdRZO2vKn3GsmQvMjo8raQ/exec"
method="GET"
target="hidden_iframe"
class="guestbook-form">

<input type="hidden" name="exhibition_id">
<input type="hidden" name="page" value="viewer">

<input type="text"
name="message"
placeholder="이 전시에 대한 한 줄 감상"
maxlength="80"
required>

<button type="submit">남기기</button>

</form>

<iframe name="hidden_iframe"
style="display:none"
onload="guestbookSaved()"></iframe>

<div class="guestbook-list">
<h4>최근 방명록</h4>
<div id="guestbook-area"></div>
</div>

</div>

<audio id="hallAudio" preload="auto" loop>
  <source src="/assets/audio/avatar_ii.mp3" type="audio/mpeg">
</audio>

<div class="page-fade" id="pageFade"></div>

<script src="/js/hall.js"></script>

<script>

function guestbookSaved(){
alert("감사합니다. 소중한 감상이 기록되었습니다.");
}

</script>

<script>

async function loadRecentGuestbook(){

const url="https://script.google.com/macros/s/AKfycbxosBRSAcNGTRHQXIm6EIVQKEnFhFlK4jMGpIDFnccUfwXcLdRZO2vKn3GsmQvMjo8raQ/exec?mode=list";

const res=await fetch(url);
const data=await res.json();

const container=document.getElementById("guestbook-area");

if(!container) return;

container.innerHTML="";

data.slice(0,5).forEach(item=>{

const div=document.createElement("div");

div.textContent="• "+item.message;

container.appendChild(div);

});

}

loadRecentGuestbook();

</script>

</body>

</html>
