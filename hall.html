<!-- Google Analytics -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-M2QQ5KME88"></script>

<!-- Favicon -->
<link rel="icon" type="image/x-icon" href="/favicon.ico">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">

<!-- Apple -->
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<meta name="theme-color" content="#111111">

<!-- Open Graph -->
<meta property="og:title" content="Gallery Window">
<meta property="og:description" content="Online Exhibition Space">
  <meta property="og:image"
        content="https://gallerywindow.com/assets/og-gallery.jpg">
<meta property="og:type" content="website">

<!-- SEO -->
<meta name="description"
content="Gallery Window — Contemporary online photography exhibition space by Kyoungsoo Kim.">

<link rel="stylesheet" href="/assets/css/style.css">

  <!-- ===== 페이지 전용 영역 (절대 서로 복사 금지) ===== -->
  <link rel="stylesheet" href="/assets/css/hall.css">


</head>

<body class="hall">

<div class="site-background hall"></div>

<h1 id="hallTitle"></h1>

<div id="exhibitionList" class="hall-grid"></div>

<!-- ======================
     Hall Entry
====================== -->

<div class="hall-entry">

<div class="hall-left">

<div class="poster-wrap">
<img id="hallPoster" class="hall-poster">

<div class="poster-caption">
ENTER EXHIBITION
<span>Click to start</span>
</div>
</div>

<div id="artistProfile" class="artist-profile"></div>

</div>

<div class="artist-note-area">

<p class="hall-guide">
전시 포스터 또는 아래의 <strong>작품보기</strong> 버튼을 클릭하면 전시가 시작됩니다.<br>
<span>Click the poster or the <strong>View Exhibition</strong> button below to enter the exhibition.</span>
</p>

<div id="artistNote" class="artist-note"></div>

<div class="entry-buttons">

<a href="/index.html" class="back-main">
← 대표화면
<span class="btn-en">Main Page</span>
</a>

<a id="enterExhibition" class="enter-exhibition">
작품 보기 →
<span class="btn-en">View Exhibition</span>
</a>

</div>

</div>

</div>

<!-- ======================
     Guestbook
====================== -->

<div class="guestbook-section">

<h3 class="guestbook-title">방명록</h3>

<form
action="https://script.google.com/macros/s/AKfycbxosBRSAcNGTRHQXIm6EIVQKEnFhFlK4jMGpIDFnccUfwXcLdRZO2vKn3GsmQvMjo8raQ/exec"
method="GET"
target="hidden_iframe"
class="guestbook-form">

<input type="hidden" name="exhibition_id">

<input
type="text"
name="message"
placeholder="이 전시에 대한 한 줄 감상"
maxlength="80"
required>

<button type="submit">남기기</button>

</form>

<iframe
name="hidden_iframe"
style="display:none"
onload="guestbookSaved()"></iframe>

<div class="guestbook-list">

<h4>최근 방명록</h4>
<div id="guestbook-area"></div>

</div>

</div>

<!-- ======================
     Audio
====================== -->

<audio id="hallAudio" preload="auto" loop>
<source src="/assets/audio/avatar_ii.mp3" type="audio/mpeg">
</audio>

<div class="page-fade" id="pageFade"></div>

<!-- ======================
     Scripts
====================== -->

<script src="/assets/js/hall.js"></script>

<script>

function guestbookSaved(){
alert("감사합니다. 소중한 감상이 기록되었습니다.");
}

async function loadRecentGuestbook(){

const url =
"https://script.google.com/macros/s/AKfycbxosBRSAcNGTRHQXIm6EIVQKEnFhFlK4jMGpIDFnccUfwXcLdRZO2vKn3GsmQvMjo8raQ/exec?mode=list";

const res = await fetch(url);
const data = await res.json();

const container = document.getElementById("guestbook-area");
if(!container) return;

container.innerHTML = "";

data.slice(0,5).forEach(item => {

const div = document.createElement("div");
div.textContent = "• " + item.message;
container.appendChild(div);

});

}

loadRecentGuestbook();

</script>

</body>
</html>
