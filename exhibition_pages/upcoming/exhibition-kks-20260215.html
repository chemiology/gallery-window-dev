<!DOCTYPE html>
<html lang="ko">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="index,follow">

<!-- ===== 전시 정보 (여기만 수정) ===== -->
<script>
const EXHIBITION = {
  id: "2026-02-kks-avatar-ii",
  artist: "김경수",
  artistEN: "Kyoungsoo Kim",
  titleKR: "아바타 II",
  titleEN: "Avatar II",
  start: "2026-02-15",
  end: "2026-03-31",
  poster: "/exhibition_pages/images/2026-02-kks-avatar-ii.jpg",
  state: "upcoming"   // upcoming 또는 past
};
</script>

<title></title>

<!-- Open Graph -->
<meta property="og:type" content="article">
<meta property="og:title" id="og-title">
<meta property="og:description" id="og-desc">
<meta property="og:url" id="og-url">
<meta property="og:image" id="og-image">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta property="og:site_name" content="Gallery Window">
<meta property="og:locale" content="ko_KR">

<!-- Twitter Card -->
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="">
<meta name="twitter:description" content="">
<meta name="twitter:image" content="">

<!-- SEO -->
<meta name="description" id="meta-desc">
<meta name="author" id="meta-author">
<meta name="keywords" id="meta-keywords">

<link rel="stylesheet" href="/assets/css/style.css">
<link rel="stylesheet" href="/assets/css/exhibition.css">
<link rel="stylesheet" href="/assets/css/exhibition-detail.css">

<!-- Structured Data -->
<script type="application/ld+json" id="structured-data"></script>

<!-- Structured Data -->
<script type="application/ld+json" id="structured-data"></script>

<link rel="image_src" id="meta-image">
<meta itemprop="image" id="schema-image">

</head>

<body class="archive-detail-page">

<main>

<article class="exhibition-content">

<figure class="exhibition-poster">
<img id="poster-image" src="" alt="">
</figure>

<section class="exhibition-text" id="exhibition-info"></section>

<div id="note-profile"></div>

<div class="back-to-list">
<a id="back-link"></a>
</div>

<div class="exhibition-nav">
  <a id="prev-exhibition"></a>
  <a id="next-exhibition"></a>
</div>

</article>

</main>

<script src="/assets/js/exhibition-detail.js"></script>

<script>

/* ===============================
   기본 데이터
=============================== */

const ex = EXHIBITION;

const url = window.location.href;

const posterURL =
`https://gallerywindow.com${ex.poster}`;

document.getElementById("meta-image").href = posterURL;
document.getElementById("schema-image").content = posterURL;

/* ===============================
   상태 처리 (예정 / 지난 전시)
=============================== */

const state = ex.state || "upcoming";

const listPage =
state === "past"
? "/archive/past.html"
: "/archive/upcoming.html";

const listText =
state === "past"
? "← 지난 전시 목록으로"
: "← 예정 전시 목록으로";

const breadcrumbPage =
state === "past"
? "https://gallerywindow.com/archive/past.html"
: "https://gallerywindow.com/archive/upcoming.html";

/* ===============================
   SEO 자동 생성
=============================== */

document.title =
`${ex.titleEN} — ${ex.artistEN} | Gallery Window`;

document.getElementById("meta-desc").content =
`${ex.titleEN}, a conceptual photography exhibition by ${ex.artistEN} at Gallery Window.`;

document.getElementById("meta-author").content =
ex.artistEN;

document.getElementById("meta-keywords").content =
`${ex.artistEN}, ${ex.titleEN}, photography exhibition, conceptual photography, online exhibition`;

document.getElementById("og-title").content =
`${ex.titleEN} — Gallery Window`;

document.getElementById("og-desc").content =
`${ex.artistEN} photography exhibition at Gallery Window`;

document.getElementById("og-url").content = url;

document.getElementById("og-image").content = posterURL;

/* ===============================
   Twitter Card
=============================== */

document.querySelector('meta[name="twitter:title"]').content =
`${ex.titleEN} — ${ex.artistEN}`;

document.querySelector('meta[name="twitter:description"]').content =
`${ex.titleEN} conceptual photography exhibition by ${ex.artistEN} at Gallery Window`;

document.querySelector('meta[name="twitter:image"]').content =
posterURL;

/* ===============================
   포스터 이미지 설정
=============================== */

const posterImg = document.getElementById("poster-image");

posterImg.src = ex.poster;

posterImg.alt =
`${ex.titleEN} conceptual photography exhibition poster by ${ex.artistEN} at Gallery Window`;

/* ===============================
   돌아가기 링크 자동 생성
=============================== */

const backLink = document.getElementById("back-link");

backLink.href = listPage;

backLink.textContent = listText;

/* ===============================
   Structured Data
=============================== */

const exhibitionData = {

"@context":"https://schema.org",

"@type":"ExhibitionEvent",

"name": ex.titleEN,

"alternateName": ex.titleKR,

"startDate": ex.start,

"endDate": ex.end,

"url": url,

"image": posterURL,

"location":{
"@type":"VirtualLocation",
"url":"https://gallerywindow.com"
},

"organizer":{
"@type":"Organization",
"name":"Gallery Window",
"url":"https://gallerywindow.com"
},

"creator":{
"@type":"Person",
"name":ex.artistEN,
"url":"https://www.kimkyoungsoo.com"
},

"workFeatured":{

"@type":"VisualArtwork",

"name":ex.titleEN,

"alternateName":ex.titleKR,

"creator":{
"@type":"Person",
"name":ex.artistEN
},

"artform":"Photography",

"genre":"Conceptual Photography",

"image":posterURL,

"associatedMedia":{

"@type":"ImageObject",

"name":`${ex.titleEN} Exhibition Poster`,

"contentUrl":posterURL,

"creator":{
"@type":"Person",
"name":ex.artistEN
},

"creditText":ex.artistEN,

"copyrightHolder":{
"@type":"Person",
"name":ex.artistEN
},

"description":
`${ex.titleEN} conceptual photography exhibition poster by ${ex.artistEN}`

}

}

};

const breadcrumbData = {

"@context":"https://schema.org",

"@type":"BreadcrumbList",

"itemListElement":[

{
"@type":"ListItem",
"position":1,
"name":"Gallery Window",
"item":"https://gallerywindow.com/"
},

{
"@type":"ListItem",
"position":2,
"name":"Exhibitions",
"item": breadcrumbPage
},

{
"@type":"ListItem",
"position":3,
"name":ex.titleEN,
"item":url
}

]

};

const structuredData = [exhibitionData, breadcrumbData];

document.getElementById("structured-data").textContent =
JSON.stringify(structuredData, null, 2);

</script>

</body>
</html>
